<!DOCTYPE html>
<html>
<head>
    <title>Result System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded">
        <h2 class="text-center mb-4">🎓 Student Result Management</h2>
        
        <div class="d-flex justify-content-between mb-3">
            <form class="d-flex w-50" action="/">
                <input name="search" class="form-control me-2" placeholder="Search by Name or Roll No...">
                <button class="btn btn-primary">Search</button>
            </form>
            <a href="/add" class="btn btn-success">+ Add New Student</a>
        </div>

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Marks</th>
                    <th>Grade</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.roll_no }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.marks }}/100</td>
                    <td><span class="badge {% if s.grade == 'Fail' %}bg-danger{% else %}bg-success{% endif %}">{{ s.grade }}</span></td>
                    <td><a href="/delete/{{s.id}}" class="text-danger">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

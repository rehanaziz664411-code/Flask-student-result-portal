<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded" style="max-width: 500px;">
        <h3>Add New Record</h3>
        <form method="POST">
            <label>Student Name</label>
            <input type="text" name="name" class="form-control mb-3" required>
            
            <label>Roll Number</label>
            <input type="text" name="roll" class="form-control mb-3" required>
            
            <label>Marks Obtained</label>
            <input type="number" name="marks" class="form-control mb-3" min="0" max="100" required>
            
            <button type="submit" class="btn btn-primary w-100">Submit Result</button>
            <a href="/" class="d-block text-center mt-3">Back to Home</a>
        </form>
    </div>
</body>
</html>
